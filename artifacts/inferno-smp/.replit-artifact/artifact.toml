kind = "web"
previewPath = "/"
title = "Inferno SMP Store"
version = "1.0.0"
id = "artifacts/inferno-smp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25679

[services.development]
run = "pnpm --filter @workspace/inferno-smp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inferno-smp", "run", "build" ]
publicDir = "artifacts/inferno-smp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25679"
BASE_PATH = "/"
